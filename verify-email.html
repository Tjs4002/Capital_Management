<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Email Verification</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .verify-box { max-width: 420px; margin: 100px auto; text-align: center; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .icon { font-size: 56px; }
    .btn { display: inline-block; margin-top: 20px; padding: 10px 24px; background: #4f46e5; color: white; border-radius: 6px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="verify-box" id="box">
    <div class="icon" id="icon">⏳</div>
    <h2 id="title">Verifying...</h2>
    <p id="message"></p>
    <a href="/login.html" class="btn" id="btn" style="display:none">Go to Login</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status');
    const icon = document.getElementById('icon');
    const title = document.getElementById('title');
    const msg = document.getElementById('message');
    const btn = document.getElementById('btn');

    if (status === 'success') {
      icon.textContent = '✅';
      title.textContent = 'Email Verified!';
      msg.textContent = 'Your account has been verified. You can now log in.';
      btn.style.display = 'inline-block';
    } else if (status === 'invalid') {
      icon.textContent = '❌';
      title.textContent = 'Invalid or Expired Link';
      msg.textContent = 'This verification link is invalid or has expired. Please request a new one.';
    }
  </script>
</body>
</html>
